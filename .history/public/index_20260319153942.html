<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBridge | Career Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .skill-tag { transition: all 0.2s; }
        .skill-tag:hover { background-color: #fee2e2; color: #ef4444; border-color: #fca5a5; }
        #roleList::-webkit-scrollbar { width: 6px; }
        #roleList::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-12 font-sans">
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2">Skill-Bridge</h1>
            <p class="text-slate-500 font-medium text-lg">AI-powered career navigator | find your path from new grad to senior</p>
        </header>

        <!-- Step 1: Skills -->
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <span class="bg-slate-100 text-slate-800 w-8 h-8 rounded-full inline-flex items-center justify-center mr-3 text-sm">1.</span>
                Your Current Skills
            </h2>
            <p class="text-slate-400 text-sm mb-4">Type a skill and press Enter (e.g., Python, SQL, Git)</p>
            
            <div id="skillsContainer" class="flex flex-wrap gap-2 mb-4">
                <!-- Skill tags will appear here -->
            </div>
            
            <input id="skillInput" type="text" placeholder="Type a skill..." 
                class="w-full border-2 border-slate-100 p-4 rounded-xl focus:outline-none focus:border-blue-400 transition-colors">
        </div>

        <!-- Step 2: Role & Level -->
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <span class="bg-slate-100 text-slate-800 w-8 h-8 rounded-full inline-flex items-center justify-center mr-3 text-sm">2.</span>
                Target Role & Level
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <select id="categoryFilter" class="w-full border-2 border-slate-100 p-3 rounded-xl bg-white outline-none focus:border-blue-400">
                    <option value="all">All Categories</option>
                    <option value="Software Engineering">Software Engineering</option>
                    <option value="Data Science & AI">Data Science & AI</option>
                    <option value="Infrastructure">Infrastructure</option>
                    <option value="Security">Security</option>
                </select>
                <input id="roleSearch" type="text" placeholder="Search roles..." 
                    class="w-full border-2 border-slate-100 p-3 rounded-xl outline-none focus:border-blue-400">
            </div>

            <!-- Scrollable Role List -->
            <div id="roleList" class="max-h-60 overflow-y-auto border-2 border-slate-50 rounded-xl p-2 mb-6 flex flex-col gap-2 bg-slate-50/50">
                <!-- Roles injected here -->
            </div>

            <!-- Selected Role Preview Card -->
            <div class="bg-blue-50 border-2 border-blue-100 p-6 rounded-xl mb-8">
                <h3 id="previewTitle" class="font-bold text-blue-900 text-lg">Select a role above</h3>
                <p id="previewDesc" class="text-blue-700 text-sm mt-1">Role description will appear here.</p>
                <span id="previewCat" class="text-[10px] uppercase tracking-wider font-black text-blue-400 mt-4 block">CATEGORY</span>
            </div>

            <label class="block font-bold text-slate-700 mb-3">Select Target Level</label>
            <div class="flex p-1 bg-slate-100 rounded-xl gap-1">
                <button onclick="setLevel('junior')" class="level-btn flex-1 py-3 px-4 rounded-lg font-bold transition-all bg-white shadow-sm text-blue-600">Junior</button>
                <button onclick="setLevel('mid')" class="level-btn flex-1 py-3 px-4 rounded-lg font-bold transition-all text-slate-500">Mid</button>
                <button onclick="setLevel('senior')" class="level-btn flex-1 py-3 px-4 rounded-lg font-bold transition-all text-slate-500">Senior</button>
            </div>
        </div>

        <button onclick="analyze()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-[0.98]">
            Analyze My Gap
        </button>

        <!-- Results Section -->
        <div id="results" class="hidden mt-12 mb-20">
            <div class="flex justify-between items-end mb-8 border-b border-slate-200 pb-6">
                <div>
                    <h2 class="text-slate-400 font-bold uppercase tracking-widest text-xs mb-1">Gap Analysis Results</h2>
                    <h3 id="resTitle" class="text-3xl font-black text-slate-900"></h3>
                </div>
                <div class="text-right">
                    <span id="resScore" class="text-5xl font-black text-blue-600 italic"></span>
                    <p class="text-slate-400 font-bold text-xs uppercase">Match Score</p>
                </div>
            </div>
            <div id="gapList" class="space-y-6"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkillBridge | Career Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-slate-800">SkillBridge Navigator</h1>
            <p class="text-gray-500">AI-powered gap analysis powered by Node.js & C++</p>
        </header>

        <div class="bg-white p-8 rounded-2xl shadow-lg">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="font-bold block mb-2">My Skills</label>
                    <input id="skillsInput" type="text" placeholder="C++, Git, Java..." class="w-full border p-3 rounded-lg">
                </div>
                <div>
                    <label class="font-bold block mb-2">Target Role</label>
                    <select id="roleSelect" class="w-full border p-3 rounded-lg"></select>
                </div>
            </div>
            
            <div class="mb-6">
                <label class="font-bold block mb-2">Level</label>
                <div class="flex gap-4">
                    <button onclick="setLevel('junior')" class="level-btn flex-1 p-3 border rounded-lg bg-blue-50">Junior</button>
                    <button onclick="setLevel('mid')" class="level-btn flex-1 p-3 border rounded-lg">Mid</button>
                    <button onclick="setLevel('senior')" class="level-btn flex-1 p-3 border rounded-lg">Senior</button>
                </div>
            </div>

            <button onclick="analyze()" id="btn" class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold hover:bg-slate-800">ANALYZE GAP</button>
        </div>

        <div id="results" class="hidden mt-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="resTitle" class="text-2xl font-bold"></h2>
                <span id="resScore" class="text-4xl font-black text-blue-600"></span>
            </div>
            <div id="gapList" class="space-y-6"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
